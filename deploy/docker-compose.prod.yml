name: ${COMPOSE_PROJECT_NAME:-colla-platform-prod}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "14"

services:
  postgres:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: ${SERVER_IMAGE:-colla-platform-server:latest}
    build:
      context: ../server
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    restart: unless-stopped
    logging: *default-logging
    environment:
      SPRING_PROFILES_ACTIVE: prod
      COLLA_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      COLLA_DATASOURCE_USERNAME: ${POSTGRES_USER}
      COLLA_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES}
      JWT_REFRESH_TOKEN_TTL_DAYS: ${JWT_REFRESH_TOKEN_TTL_DAYS}
      INIT_ADMIN_USERNAME: ${INIT_ADMIN_USERNAME}
      INIT_ADMIN_PASSWORD: ${INIT_ADMIN_PASSWORD}
      INIT_ADMIN_DISPLAY_NAME: ${INIT_ADMIN_DISPLAY_NAME}
      INIT_ADMIN_EMAIL: ${INIT_ADMIN_EMAIL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES}
      COLLA_COLLABORATION_INTERNAL_SECRET: ${COLLA_COLLABORATION_INTERNAL_SECRET}
      COLLA_COLLABORATION_PUBLIC_URL: /collaboration
      LOG_PATH: /app/logs
    volumes:
      - server_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  collaboration-a:
    image: ${COLLABORATION_IMAGE:-colla-platform-collaboration:latest}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    restart: unless-stopped
    logging: *default-logging
    environment:
      COLLA_BACKEND_INTERNAL_URL: http://server:8080/api/internal/knowledge-collaboration
      COLLA_COLLABORATION_INTERNAL_SECRET: ${COLLA_COLLABORATION_INTERNAL_SECRET}
      COLLA_COLLABORATION_PORT: 1234
      COLLA_COLLABORATION_NODE_ID: collaboration-a
      COLLA_COLLABORATION_REDIS_HOST: redis
      COLLA_COLLABORATION_REDIS_PORT: 6379
      COLLA_COLLABORATION_MAX_UPDATE_BYTES: 1048576
    depends_on:
      server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:1234/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  collaboration-b:
    image: ${COLLABORATION_IMAGE:-colla-platform-collaboration:latest}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    restart: unless-stopped
    logging: *default-logging
    environment:
      COLLA_BACKEND_INTERNAL_URL: http://server:8080/api/internal/knowledge-collaboration
      COLLA_COLLABORATION_INTERNAL_SECRET: ${COLLA_COLLABORATION_INTERNAL_SECRET}
      COLLA_COLLABORATION_PORT: 1234
      COLLA_COLLABORATION_NODE_ID: collaboration-b
      COLLA_COLLABORATION_REDIS_HOST: redis
      COLLA_COLLABORATION_REDIS_PORT: 6379
      COLLA_COLLABORATION_MAX_UPDATE_BYTES: 1048576
    depends_on:
      server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:1234/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    image: ${WEB_IMAGE:-colla-platform-web:latest}
    build:
      context: ..
      dockerfile: web/Dockerfile
      args:
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 6

  nginx:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/colla.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy
      server:
        condition: service_healthy
      collaboration-a:
        condition: service_healthy
      collaboration-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
  redis_data:
  minio_data:
  server_logs:
