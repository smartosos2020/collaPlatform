map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

resolver 127.0.0.11 valid=10s ipv6=off;

upstream collaboration_nodes {
    zone collaboration_nodes 64k;
    least_conn;
    server collaboration-a:1234 resolve max_fails=2 fail_timeout=5s;
    server collaboration-b:1234 resolve max_fails=2 fail_timeout=5s;
}

upstream api_nodes {
    zone api_nodes 64k;
    least_conn;
    server api-a:8080 resolve max_fails=2 fail_timeout=5s;
    server api-b:8080 resolve max_fails=2 fail_timeout=5s;
    keepalive 32;
}

upstream event_gateway_nodes {
    zone event_gateway_nodes 32k;
    server event-gateway:8080 resolve;
    keepalive 8;
}

log_format colla_upstream '$remote_addr "$request" $status upstream=$upstream_addr '
                          'upstream_status=$upstream_status request_time=$request_time '
                          'upstream_time=$upstream_response_time request_id=$http_x_colla_request_id';

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;
    access_log /var/log/nginx/access.log colla_upstream;

    location /api/ {
        proxy_pass http://api_nodes/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /actuator/health {
        return 404;
    }

    location /ws/ {
        proxy_pass http://event_gateway_nodes/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }

    location /collaboration {
        proxy_pass http://collaboration_nodes;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
