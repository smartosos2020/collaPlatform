services:
  postgres:
    image: postgres:16-alpine
    container_name: colla-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-colla_platform}
      POSTGRES_USER: ${POSTGRES_USER:-colla}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-colla_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-colla} -d ${POSTGRES_DB:-colla_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: colla-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: colla-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-colla_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-colla_minio_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:

