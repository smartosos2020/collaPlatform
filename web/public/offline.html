<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colla Offline</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        margin: 0;
        padding: 24px;
        color: #111827;
        background: #f5f7fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 420px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #fff;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #64748b;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前离线</h1>
      <p>网络恢复后请重新打开页面。已缓存的应用外壳可继续加载，但新的保存、搜索和消息发送需要连接服务器。</p>
    </main>
  </body>
</html>
