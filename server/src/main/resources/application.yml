spring:
  application:
    name: colla-platform
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/colla_platform
    username: colla
    password: colla_dev_password
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui

colla:
  storage:
    endpoint: http://localhost:9000
    access-key: colla_minio
    secret-key: colla_minio_password
    bucket: colla-files
  security:
    access-secret: change-me-access
    refresh-secret: change-me-refresh

