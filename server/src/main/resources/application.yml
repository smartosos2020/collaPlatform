spring:
  application:
    name: colla-platform
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/colla_platform
    username: colla
    password: colla_dev_password
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 500
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

server:
  port: 8080
  error:
    include-path: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui

colla:
  storage:
    endpoint: http://localhost:9000
    access-key: colla_minio
    secret-key: colla_minio_password
    bucket: colla-files
    max-upload-size-bytes: 104857600
  security:
    access-secret: change-me-access
    refresh-secret: change-me-refresh
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 30
  web-security:
    cors-allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  password-policy:
    min-length: 8
    require-letter: true
    require-digit: true
  init-admin:
    username: admin
    password: admin123456
    display-name: Administrator
    email: admin@colla.local
  knowledge-collaboration:
    public-url: ${COLLA_COLLABORATION_PUBLIC_URL:ws://localhost:1234}
    internal-url: ${COLLA_COLLABORATION_INTERNAL_URL:http://localhost:1234}
    internal-secret: ${COLLA_COLLABORATION_INTERNAL_SECRET:colla-local-collaboration-secret}
    ticket-ttl: 5m
    max-update-bytes: 1048576
    retained-updates: 100
    expired-ticket-retention: 1h
