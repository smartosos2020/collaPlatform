spring:
  application:
    name: colla-platform
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/colla_platform
    username: colla
    password: colla_dev_password
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 500
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful
  error:
    include-path: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,runtimeRoleReadiness,domainEventWorkerReadiness
        liveness:
          include: livenessState

springdoc:
  swagger-ui:
    path: /swagger-ui

colla:
  runtime:
    role: ${COLLA_RUNTIME_ROLE:}
    instance-id: ${COLLA_INSTANCE_ID:${HOSTNAME:local}}
    version: ${COLLA_VERSION:0.1.0}
    commit: ${SOURCE_COMMIT:unknown}
  events:
    worker:
      enabled: ${COLLA_EVENT_WORKER_ENABLED:false}
      poll-interval: ${COLLA_EVENT_WORKER_POLL_INTERVAL:1s}
      recovery-interval: ${COLLA_EVENT_WORKER_RECOVERY_INTERVAL:15s}
      heartbeat-interval: ${COLLA_EVENT_WORKER_HEARTBEAT_INTERVAL:10s}
      shutdown-grace: ${COLLA_EVENT_WORKER_SHUTDOWN_GRACE:25s}
      claim-batch: ${COLLA_EVENT_WORKER_CLAIM_BATCH:20}
      concurrency: ${COLLA_EVENT_WORKER_CONCURRENCY:4}
      queue-capacity: ${COLLA_EVENT_WORKER_QUEUE_CAPACITY:16}
      connection-budget: ${COLLA_EVENT_WORKER_CONNECTION_BUDGET:6}
      expected-instances: ${COLLA_EVENT_WORKER_EXPECTED_INSTANCES:2}
      postgresql-connection-budget: ${COLLA_POSTGRESQL_CONNECTION_BUDGET:100}
    delivery:
      lease-duration: ${COLLA_EVENT_LEASE_DURATION:30s}
      max-execution-duration: ${COLLA_EVENT_MAX_EXECUTION_DURATION:10m}
      base-retry-delay: ${COLLA_EVENT_BASE_RETRY_DELAY:2s}
      max-retry-delay: ${COLLA_EVENT_MAX_RETRY_DELAY:5m}
      max-attempts: ${COLLA_EVENT_MAX_ATTEMPTS:8}
      max-claim-batch: ${COLLA_EVENT_MAX_CLAIM_BATCH:100}
      max-maintenance-batch: ${COLLA_EVENT_MAX_MAINTENANCE_BATCH:100}
  storage:
    endpoint: http://localhost:9000
    access-key: colla_minio
    secret-key: colla_minio_password
    bucket: colla-files
    max-upload-size-bytes: 104857600
  security:
    access-secret: change-me-access
    refresh-secret: change-me-refresh
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 30
  web-security:
    cors-allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  password-policy:
    min-length: 8
    require-letter: true
    require-digit: true
  init-admin:
    username: admin
    password: admin123456
    display-name: Administrator
    email: admin@colla.local
  knowledge-collaboration:
    public-url: ${COLLA_COLLABORATION_PUBLIC_URL:ws://localhost:1234}
    internal-url: ${COLLA_COLLABORATION_INTERNAL_URL:http://localhost:1234}
    internal-secret: ${COLLA_COLLABORATION_INTERNAL_SECRET:colla-local-collaboration-secret}
    ticket-ttl: 5m
    max-update-bytes: 1048576
    retained-updates: 100
    expired-ticket-retention: 1h
