spring:
  datasource:
    url: ${COLLA_DATASOURCE_URL:jdbc:postgresql://localhost:5432/colla_platform}
    username: ${COLLA_DATASOURCE_USERNAME:colla}
    password: ${COLLA_DATASOURCE_PASSWORD:colla_dev_password}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

colla:
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:colla_minio}
    secret-key: ${MINIO_SECRET_KEY:colla_minio_password}
    bucket: ${MINIO_BUCKET:colla-files}
    max-upload-size-bytes: ${MAX_UPLOAD_SIZE_BYTES:104857600}
  security:
    access-secret: ${JWT_ACCESS_SECRET:change-me-access}
    refresh-secret: ${JWT_REFRESH_SECRET:change-me-refresh}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:30}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:30}
  web-security:
    cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  password-policy:
    min-length: ${PASSWORD_MIN_LENGTH:8}
    require-letter: ${PASSWORD_REQUIRE_LETTER:true}
    require-digit: ${PASSWORD_REQUIRE_DIGIT:true}
  init-admin:
    username: ${INIT_ADMIN_USERNAME:admin}
    password: ${INIT_ADMIN_PASSWORD:admin123456}
    display-name: ${INIT_ADMIN_DISPLAY_NAME:Administrator}
    email: ${INIT_ADMIN_EMAIL:admin@colla.local}
